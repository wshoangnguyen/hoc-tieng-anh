<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Catch the Card - Bắt thẻ bài tiếng Anh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #f5deb3 0%, #fffacd 50%, #faebd7 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            padding: 12px 25px;
            border-radius: 60px;
            margin-bottom: 20px;
        }

        .game-header h1 {
            font-size: 1.6rem;
            color: #fff;
            text-shadow: 2px 2px 0 #b45f2b;
        }

        .game-info {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
        }

        .progress-bar-container {
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar {
            width: 120px;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffb347, #ff8c1a);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .back-btn {
            background: #ffb347;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #ff8c1a;
            transform: translateY(-2px);
        }

        .category-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .cat-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #1e5a7a;
        }

        .cat-btn.active {
            background: #ffb347;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .cat-btn:hover {
            transform: translateY(-2px);
        }

        .game-area {
            position: relative;
            background: rgba(46, 125, 100, 0.2);
            border-radius: 60px;
            min-height: 500px;
            height: 65vh;
            margin-bottom: 20px;
            overflow: hidden;
            border: 3px dashed #ffb347;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.2);
        }

        .moving-card {
            position: absolute;
            width: 110px;
            height: 130px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.05s linear, box-shadow 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            z-index: 10;
        }

        .moving-card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }

        .moving-card img {
            max-width: 80%;
            max-height: 70px;
            object-fit: contain;
            border-radius: 12px;
            pointer-events: none;
        }

        .moving-card .card-word {
            font-weight: bold;
            font-size: 0.7rem;
            margin-top: 5px;
            color: #1e5a7a;
            background: #fff0d6;
            padding: 2px 8px;
            border-radius: 20px;
            pointer-events: none;
        }

        .question-area {
            background: rgba(0,0,0,0.6);
            border-radius: 60px;
            padding: 15px 20px;
            text-align: center;
            margin-bottom: 20px;
            backdrop-filter: blur(4px);
        }

        .question-text {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0 #b45f2b;
            letter-spacing: 2px;
        }

        .speak-hint {
            background: #ffb347;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            margin-top: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .speak-hint:hover {
            background: #ff8c1a;
            transform: scale(1.02);
        }

        .feedback-area {
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
            font-size: 1.2rem;
            color: white;
            text-shadow: 1px 1px 0 #000;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .game-btn {
            background: #ffb347;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .game-btn:hover {
            background: #ff8c1a;
            transform: translateY(-2px);
        }

        .brand-logo-float {
            position: fixed;
            bottom: 20px;
            right: 25px;
            z-index: 150;
            cursor: pointer;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            animation: gentleSwing 3s ease-in-out infinite;
        }
        .brand-logo-float img {
            width: 150px;
            object-fit: contain;
        }
        
        @keyframes gentleSwing {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(6deg); }
            75% { transform: rotate(-6deg); }
        }
        
        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes bounceIn {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        @media (max-width: 700px) {
            .brand-logo-float { width: 55px; top: 12px; right: 12px; bottom: auto; }
            .moving-card { width: 85px; height: 100px; }
            .moving-card img { max-height: 50px; }
            .question-text { font-size: 1.5rem; }
            .progress-bar { width: 80px; }
        }
    </style>
</head>
<body>

<div class="brand-logo-float" id="brandLogoFloat">
    <img src="https://lh3.googleusercontent.com/d/1e7uth2SJ0qoL0cHXBizZunjscTiJ9Da9=s400" alt="Logo" onerror="this.src='https://via.placeholder.com/70?text=LOGO'">
</div>

<div class="game-container">
    <div class="game-header">
        <h1>🐟 Catch the Card · Bắt thẻ bài 🎴</h1>
        <div class="game-info">
            <span>🎯 Điểm: <span id="scoreValue">0</span>/<span id="targetScore">20</span></span>
            <span>📊 Lượt: <span id="totalValue">0</span></span>
            <div class="progress-bar-container">
                <span>⚡</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span id="speedValue">1.0x</span>
            </div>
        </div>
        <a href="../flashcard.html" class="back-btn">← Về Flashcards</a>
    </div>

    <div class="category-selector" id="categorySelector">
        <button class="cat-btn active" data-cat="all">📚 Tất cả</button>
    </div>

    <div class="question-area">
        <div class="question-text" id="targetWordDisplay">🐣 Đang tải...</div>
        <div class="speak-hint" id="speakTargetBtn">🔊 Nghe lại từ</div>
    </div>

    <div class="game-area" id="gameArea"></div>

    <div class="feedback-area" id="feedbackMsg"></div>
    <div class="controls">
        <button class="game-btn" id="resetGameBtn">🔄 Chơi lại</button>
        <button class="game-btn" id="shuffleCardsBtn">🎲 Đổi thẻ</button>
    </div>
</div>

<script src="../js/game-utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script>
    // ---------- BIẾN TOÀN CỤC ----------
    let activeCards = [];
    let animationFrame = null;
    let currentTargetWord = '';
    let currentTargetMeaning = '';
    let currentTargetObj = null;
    
    let score = 0;
    let totalAttempts = 0;
    let capturedWords = [];
    let gameActive = true;
    let waitingForNext = false;
    let currentCategory = 'all';
    let gameCompleted = false;
    
    const WIN_SCORE = 20;
    
    let container = document.getElementById('gameArea');
    let targetWordDisplay = document.getElementById('targetWordDisplay');
    let scoreSpan = document.getElementById('scoreValue');
    let totalSpan = document.getElementById('totalValue');
    let speedSpan = document.getElementById('speedValue');
    let feedbackDiv = document.getElementById('feedbackMsg');
    let progressFill = document.getElementById('progressFill');
    
    let currentSpeed = 1.0;
    const BASE_SPEED = 1.2;
    
    let gameWidth = 0, gameHeight = 0;
    let cardWidth = 110, cardHeight = 130;
    let currentCardCount = 6;
    let vocabulary = [];
    let totalWordsInCategory = 0;     // Tổng số từ trong danh mục hiện tại

    // Cập nhật thanh tiến trình
    function updateProgressBar() {
        let percent = (score / WIN_SCORE) * 100;
        progressFill.style.width = percent + '%';
    }
    
    // Hàm resize
    function updateGameDimensions() {
        const rect = container.getBoundingClientRect();
        gameWidth = rect.width;
        gameHeight = rect.height;
        if (gameWidth < 500) {
            cardWidth = 85;
            cardHeight = 100;
        } else {
            cardWidth = 110;
            cardHeight = 130;
        }
    }
    
    // Lấy dữ liệu từ vựng
    function loadVocabularyData() {
        const stored = localStorage.getItem('flashcard_vocabulary');
        if (stored) {
            vocabulary = JSON.parse(stored);
            return true;
        }
        return false;
    }
    
    // Tạo danh mục filter
    function buildCategoryFilter() {
        if (!vocabulary.length) return;
        const categories = new Set();
        vocabulary.forEach(item => categories.add(item.category));
        const containerCat = document.getElementById('categorySelector');
        const allBtn = containerCat.querySelector('.cat-btn');
        containerCat.innerHTML = '';
        containerCat.appendChild(allBtn);
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.dataset.cat = cat;
            btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
            containerCat.appendChild(btn);
        });
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.cat;
                resetGame();
            });
        });
    }
    
    function getFilteredVocabulary() {
        if (currentCategory === 'all') return [...vocabulary];
        return vocabulary.filter(item => item.category === currentCategory);
    }
    
    function selectRandomCards(count) {
        let filtered = getFilteredVocabulary();
        if (filtered.length === 0) return [];
        let maxCount = Math.min(count, filtered.length);
        let shuffled = [...filtered];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, maxCount);
    }
    
    function createCardElement(wordObj) {
        const div = document.createElement('div');
        div.className = 'moving-card';
        const imagePath = getImageBasePath() + wordObj.word;
        const img = document.createElement('img');
        img.src = `${imagePath}.png`;
        img.onerror = function() { this.src = `${imagePath}.jpg`; };
        const wordSpan = document.createElement('div');
        wordSpan.className = 'card-word';
        wordSpan.textContent = wordObj.word;
        div.appendChild(img);
        div.appendChild(wordSpan);
        
        let x = Math.random() * (gameWidth - cardWidth);
        let y = Math.random() * (gameHeight - cardHeight);
        x = Math.max(5, Math.min(x, gameWidth - cardWidth - 5));
        y = Math.max(5, Math.min(y, gameHeight - cardHeight - 5));
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        
        let angle = Math.random() * Math.PI * 2;
        let spd = BASE_SPEED * currentSpeed * (0.6 + Math.random() * 0.8);
        let vx = Math.cos(angle) * spd;
        let vy = Math.sin(angle) * spd;
        
        container.appendChild(div);
        return {
            element: div,
            word: wordObj.word,
            meaning: wordObj.meaning,
            imgPath: imagePath,
            x: x, y: y, vx: vx, vy: vy,
            width: cardWidth, height: cardHeight
        };
    }
    
    function updatePositions() {
        for (let card of activeCards) {
            card.x += card.vx;
            card.y += card.vy;
            if (card.x <= 0) {
                card.x = 0;
                card.vx = Math.abs(card.vx);
            }
            if (card.x + cardWidth >= gameWidth) {
                card.x = gameWidth - cardWidth;
                card.vx = -Math.abs(card.vx);
            }
            if (card.y <= 0) {
                card.y = 0;
                card.vy = Math.abs(card.vy);
            }
            if (card.y + cardHeight >= gameHeight) {
                card.y = gameHeight - cardHeight;
                card.vy = -Math.abs(card.vy);
            }
            card.element.style.left = card.x + 'px';
            card.element.style.top = card.y + 'px';
        }
    }
    
    function animate() {
        if (!gameActive && waitingForNext) {
            updatePositions();
            animationFrame = requestAnimationFrame(animate);
            return;
        }
        updatePositions();
        animationFrame = requestAnimationFrame(animate);
    }
    
    function selectNewTarget() {
        if (activeCards.length === 0) return false;
        const randomIndex = Math.floor(Math.random() * activeCards.length);
        const targetCard = activeCards[randomIndex];
        currentTargetWord = targetCard.word;
        currentTargetMeaning = targetCard.meaning;
        currentTargetObj = targetCard;
        targetWordDisplay.innerHTML = `🎯 BẮT: ${currentTargetWord.toUpperCase()} 🎯`;
        speakWord(currentTargetWord);
        return true;
    }
    
    function clearCards() {
        for (let card of activeCards) {
            if (card.element && card.element.parentNode) card.element.remove();
        }
        activeCards = [];
    }
    
    function updateScoreUI() {
        scoreSpan.innerText = score;
        totalSpan.innerText = totalAttempts;
        updateProgressBar();
    }
    
    function simpleConfetti() {
        for (let i = 0; i < 80; i++) {
            const conf = document.createElement('div');
            conf.style.position = 'fixed';
            conf.style.left = Math.random() * window.innerWidth + 'px';
            conf.style.top = '-20px';
            conf.style.width = Math.random() * 10 + 4 + 'px';
            conf.style.height = Math.random() * 10 + 4 + 'px';
            conf.style.backgroundColor = ['#ffb347', '#ff6b6b', '#4ecdc4', '#ffd700'][Math.floor(Math.random() * 4)];
            conf.style.borderRadius = '50%';
            conf.style.pointerEvents = 'none';
            conf.style.zIndex = '9999';
            conf.style.animation = 'fall 1s ease-out forwards';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 1000);
        }
    }
    
    function shootConfetti() {
        if (typeof canvasConfetti === 'undefined') {
            simpleConfetti();
            return;
        }
        canvasConfetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            startVelocity: 20,
            colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff']
        });
        setTimeout(() => {
            canvasConfetti({
                particleCount: 50,
                angle: 60,
                spread: 55,
                origin: { x: 0, y: 0.7 },
                startVelocity: 25,
            });
            canvasConfetti({
                particleCount: 50,
                angle: 120,
                spread: 55,
                origin: { x: 1, y: 0.7 },
                startVelocity: 25,
            });
        }, 100);
    }
    
    function shootStrongConfetti() {
        if (typeof canvasConfetti !== 'undefined') {
            canvasConfetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                startVelocity: 30,
                decay: 0.9,
                colors: ['#ffd700', '#ffb347', '#ff6b6b', '#4ecdc4', '#45b7d1']
            });
            setTimeout(() => {
                canvasConfetti({
                    particleCount: 80,
                    angle: 45,
                    spread: 60,
                    origin: { x: 0, y: 0.5 },
                });
                canvasConfetti({
                    particleCount: 80,
                    angle: 135,
                    spread: 60,
                    origin: { x: 1, y: 0.5 },
                });
            }, 150);
        } else {
            simpleConfetti();
            setTimeout(() => simpleConfetti(), 150);
        }
    }
    
    function showWinSummary() {
        cancelAnimationFrame(animationFrame);
        playBeep('win');
        
            const maxScore = Math.min(WIN_SCORE, totalWordsInCategory);
    const isCompleteAll = (capturedWords.length >= totalWordsInCategory);
        
        const overlay = document.createElement('div');
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        `;
        
        const accuracy = totalAttempts > 0 ? Math.round((score / totalAttempts) * 100) : 0;
        
        let wordsListHtml = '';
        capturedWords.forEach((item, idx) => {
            wordsListHtml += `
                <div style="
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 10px;
                    margin: 5px 0;
                    background: rgba(255,179,71,0.2);
                    border-radius: 20px;
                    border-left: 4px solid #ffb347;
                ">
                    <div style="text-align: left;">
                        <strong style="color: #1e5a7a; font-size: 1rem;">${item.word}</strong>
                        <div style="color: #b45f2b; font-size: 0.75rem;">${item.meaning}</div>
                    </div>
                    <div style="color: #2e7d64;">✅</div>
                </div>
            `;
        });
        
        const summaryBox = document.createElement('div');
        summaryBox.style.cssText = `
            background: linear-gradient(135deg, #fff5e6, #ffe8d4);
            border-radius: 40px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.4s ease;
            text-align: center;
        `;
        
        summaryBox.innerHTML = `
            <div style="margin-bottom: 20px;">
        <div style="margin-bottom: 20px;">
            <h2 style="color: #ffb347; font-size: 2rem;">🏆 ${isCompleteAll ? 'CHÚC MỪNG' : 'BẠN ĐÃ THẮNG!'} 🏆</h2>
            <div style="font-size: 3rem; margin: 10px 0;">${isCompleteAll ? 'Bạn đã thắng trò chơi!' : '🎉✨🎊'}</div>
        </div>
        
        <div style="background: #ffb34720; border-radius: 30px; padding: 15px; margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; margin: 8px 0;">
                <span style="font-weight: bold;">📊 Điểm số:</span>
                <span style="color: #2e7d64; font-weight: bold;">${score}/${maxScore}</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin: 8px 0;">
                <span style="font-weight: bold;">📖 Từ đã học:</span>
                <span>${capturedWords.length}/${totalWordsInCategory}</span>
            </div>
                <div style="display: flex; justify-content: space-between; margin: 8px 0;">
                    <span style="font-weight: bold;">⭐ Độ chính xác:</span>
                    <span style="color: ${accuracy >= 80 ? '#2e7d64' : accuracy >= 60 ? '#ffb347' : '#a1422f'}; font-weight: bold;">${accuracy}%</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin: 8px 0;">
                    <span style="font-weight: bold;">⚡ Tốc độ cuối:</span>
                    <span>${currentSpeed.toFixed(1)}x</span>
                </div>
            </div>
            
            <div style="margin-bottom: 20px;">
                <h3 style="color: #1e5a7a; margin-bottom: 10px;">📖 Từ đã bắt được (${capturedWords.length} từ)</h3>
                <div style="max-height: 300px; overflow-y: auto;">
                    ${wordsListHtml || '<div style="color: #888; padding: 20px;">Chưa có từ nào</div>'}
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button onclick="location.reload()" style="
                    background: #ffb347;
                    border: none;
                    padding: 12px 25px;
                    border-radius: 40px;
                    font-weight: bold;
                    cursor: pointer;
                    color: white;
                    font-size: 1rem;
                ">🔄 Chơi lại</button>
                <button onclick="window.location.href='../flashcard.html'" style="
                    background: #2e7d64;
                    border: none;
                    padding: 12px 25px;
                    border-radius: 40px;
                    font-weight: bold;
                    cursor: pointer;
                    color: white;
                    font-size: 1rem;
                ">📚 Về Flashcards</button>
            </div>
        `;
        
        overlay.appendChild(summaryBox);
        document.body.appendChild(overlay);
        
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.remove();
        });
        
        setTimeout(() => {
            speakWord('Congratulations! You won the game!');
        }, 500);
    }
    
    function initGame(keepScore = false) {
        if (!keepScore) {
            score = 0;
            totalAttempts = 0;
            capturedWords = [];
            gameCompleted = false;
            currentSpeed = 1.0;
            speedSpan.innerText = '1.0';
            updateScoreUI();
        // LƯU TỔNG SỐ TỪ TRONG DANH MỤC
        const filteredVocab = getFilteredVocabulary();
        totalWordsInCategory = filteredVocab.length;
        
        // Cập nhật hiển thị mục tiêu
        document.getElementById('targetScore').innerText = Math.min(WIN_SCORE, totalWordsInCategory);
    
        }
        waitingForNext = false;
        gameActive = true;
        feedbackDiv.innerHTML = '';
        clearCards();
        updateGameDimensions();
        
        currentCardCount = Math.floor(Math.random() * 3) + 5;
        const filteredVocab = getFilteredVocabulary();
        if (filteredVocab.length < currentCardCount) {
            currentCardCount = filteredVocab.length;
        }
        if (currentCardCount === 0) {
            targetWordDisplay.innerHTML = '⚠️ Chưa có từ vựng!';
            return;
        }
        
        const selectedWords = selectRandomCards(currentCardCount);
        if (selectedWords.length === 0) return;
        
        for (let w of selectedWords) {
            let cardData = createCardElement(w);
            activeCards.push(cardData);
        }
        
        if (activeCards.length > 0) {
            selectNewTarget();
        }
        speedSpan.innerText = currentSpeed.toFixed(1);
        bindCardEvents();
    }
    
    function bindCardEvents() {
        for (let card of activeCards) {
            card.element.onclick = (e) => {
                e.stopPropagation();
                onCardClick(card);
            };
        }
    }
    
    function onCardClick(card) {
        if (waitingForNext || !gameActive || gameCompleted) return;
        
        const clickedWord = card.word;
        totalAttempts++;
        updateScoreUI();
        
        if (clickedWord === currentTargetWord) {
            playBeep('correct');
            shootConfetti();
            score++;
            
            capturedWords.push({
                word: currentTargetWord,
                meaning: currentTargetMeaning
            });
            
            updateScoreUI();
            feedbackDiv.innerHTML = '🎉 Chính xác! +1 điểm 🎉';
            feedbackDiv.style.color = '#c3ffb2';
            speakWord(currentTargetWord);

            // KIỂM TRA KẾT THÚC GAME (ĐẠT ĐIỂM TỐI ĐA HOẶC HẾT TỪ)
    const maxScore = Math.min(WIN_SCORE, totalWordsInCategory);
    if (score >= maxScore || capturedWords.length >= totalWordsInCategory) {
        gameCompleted = true;
        gameActive = false;
        waitingForNext = true;
        showWinSummary();
        return;
    }
            
            if (score >= WIN_SCORE) {
                gameCompleted = true;
                gameActive = false;
                waitingForNext = true;
                showWinSummary();
                return;
            }
            
            const index = activeCards.findIndex(c => c.word === clickedWord && c.element === card.element);
            if (index !== -1) {
                const removedCard = activeCards[index];
                removedCard.element.remove();
                activeCards.splice(index, 1);
            }
            
            if (activeCards.length === 0) {
                feedbackDiv.innerHTML += ' 🃏 Hết thẻ! Tạo bộ mới!';
                waitingForNext = true;
                setTimeout(() => {
                    if (!gameCompleted) initGame(true);
                }, 800);
                return;
            }
            
            waitingForNext = true;
            gameActive = false;
            setTimeout(() => {
                if (!gameCompleted && activeCards.length > 0) {
                    selectNewTarget();
                } else if (!gameCompleted && activeCards.length === 0) {
                    initGame(true);
                }
                gameActive = true;
                waitingForNext = false;
                feedbackDiv.innerHTML = '';
            }, 600);
        } else {
            playBeep('wrong');
            feedbackDiv.innerHTML = `❌ Sai rồi! Từ cần bắt là "${currentTargetWord}" - ${currentTargetMeaning} ❌`;
            feedbackDiv.style.color = '#ffc2b3';
            gameActive = false;
            waitingForNext = true;
            setTimeout(() => {
                gameActive = true;
                waitingForNext = false;
                feedbackDiv.innerHTML = '';
            }, 800);
        }
        updateScoreUI();
        
        if (score > 0 && score % 5 === 0 && currentSpeed < 2.2 && !gameCompleted) {
            currentSpeed = Math.min(2.2, currentSpeed + 0.2);
            speedSpan.innerText = currentSpeed.toFixed(1);
            shootStrongConfetti();
            for (let card of activeCards) {
                let angle = Math.atan2(card.vy, card.vx);
                let newSpd = BASE_SPEED * currentSpeed * (0.6 + Math.random() * 0.8);
                card.vx = Math.cos(angle) * newSpd;
                card.vy = Math.sin(angle) * newSpd;
            }
            feedbackDiv.innerHTML = `⚡ Tốc độ tăng lên ${currentSpeed.toFixed(1)}x! ⚡`;
            setTimeout(() => {
                if(feedbackDiv.innerHTML.includes('Tốc độ tăng')) feedbackDiv.innerHTML = '';
            }, 1500);
        }
    }
    
    function resetGame() {
        cancelAnimationFrame(animationFrame);
        clearCards();
        score = 0;
        totalAttempts = 0;
        capturedWords = [];
        currentSpeed = 1.0;
        gameActive = true;
        waitingForNext = false;
        gameCompleted = false;
        updateScoreUI();
        speedSpan.innerText = '1.0';
        feedbackDiv.innerHTML = '';
        updateGameDimensions();
        initGame(false);
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
    }
    
    function shuffleCards() {
        if (waitingForNext || gameCompleted) return;
        cancelAnimationFrame(animationFrame);
        clearCards();
        const filteredVocab = getFilteredVocabulary();
        if (filteredVocab.length === 0) return;
        currentCardCount = Math.min(7, Math.max(5, filteredVocab.length));
        const selectedWords = selectRandomCards(currentCardCount);
        activeCards = [];
        for (let w of selectedWords) {
            let cardData = createCardElement(w);
            activeCards.push(cardData);
        }
        if (activeCards.length > 0) {
            selectNewTarget();
        }
        bindCardEvents();
        gameActive = true;
        waitingForNext = false;
        feedbackDiv.innerHTML = '🃏 Đã xào bài! Tìm từ mới nào!';
        setTimeout(() => {
            if(feedbackDiv.innerHTML === '🃏 Đã xào bài! Tìm từ mới nào!') feedbackDiv.innerHTML = '';
        }, 1200);
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
    }
    
    document.getElementById('speakTargetBtn').addEventListener('click', () => {
        if (currentTargetWord) speakWord(currentTargetWord);
    });
    
    window.addEventListener('resize', () => {
        updateGameDimensions();
        if (activeCards.length) {
            for (let card of activeCards) {
                card.x = Math.min(Math.max(card.x, 0), gameWidth - cardWidth);
                card.y = Math.min(Math.max(card.y, 0), gameHeight - cardHeight);
                card.element.style.left = card.x + 'px';
                card.element.style.top = card.y + 'px';
            }
        }
    });
    
    function startGame() {
        if (!loadVocabularyData()) {
            targetWordDisplay.innerHTML = '⚠️ Chưa có dữ liệu! Mở flashcard.html trước.';
            feedbackDiv.innerHTML = '❌ Không tìm thấy từ vựng, hãy vào flashcard.html trước.';
            return;
        }
        buildCategoryFilter();
        updateGameDimensions();
        initGame(false);
        animationFrame = requestAnimationFrame(animate);
    }
    
    document.getElementById('resetGameBtn').addEventListener('click', () => resetGame());
    document.getElementById('shuffleCardsBtn').addEventListener('click', () => shuffleCards());
    
    startGame();
</script>
</body>
</html>
