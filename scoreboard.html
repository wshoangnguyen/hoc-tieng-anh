<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng Điểm Thi Đua - Học Tiếng Anh Dễ Lắm</title>
<link rel="icon" href="https://hoctienganhdelam.com/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaina+2:wght@400..800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFF8ED;--card:#fff;--text:#333;--text-dim:#999;--accent:#fcbe5d;--accent2:#f7d281;--purple:#6C5CE7;--green:#00b894;--red:#e17055;--blue:#0984e3;--border:#f0e6d3;--shadow:0 4px 20px rgba(0,0,0,.06);--shadow-lg:0 8px 36px rgba(0,0,0,.1);--streak:#ff6b35}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Quicksand,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.navbar{position:fixed;top:0;width:100%;background:rgba(255,250,240,.98);backdrop-filter:blur(10px);box-shadow:0 2px 16px rgba(0,0,0,.06);z-index:100;padding:10px 0;border-bottom:1px solid var(--border)}
.nav-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 20px;flex-wrap:wrap;gap:10px}
.logo-link{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-img{height:40px}.logo-text{font-family:'Baloo Bhaina 2',serif;font-weight:800;font-size:18px;color:#d4a017;line-height:1.2}
.logo-sub{font-size:9px;color:var(--accent);letter-spacing:1px;display:block}
.nav-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.inp{border:2px solid var(--border);border-radius:20px;padding:7px 14px;font-size:13px;background:var(--card);color:var(--text);outline:none;font-family:Quicksand,sans-serif;width:140px;transition:.2s}
.inp:focus{border-color:var(--accent)}
.btn{border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:Quicksand,sans-serif;transition:.2s;display:flex;align-items:center;gap:4px}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#333}.btn-p:hover{transform:translateY(-1px);box-shadow:0 2px 12px rgba(252,190,93,.4)}
.btn-o{background:var(--card);border:2px solid var(--border);color:var(--text)}.btn-o:hover{background:#fffbf0;border-color:var(--accent)}
.btn-d{background:linear-gradient(135deg,#e17055,#d63031);color:#fff}.btn-d:hover{transform:translateY(-1px)}
.badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}.badge-on{background:#00b89415;color:var(--green)}.badge-off{background:#e1705515;color:var(--red)}
.teacher-bar{background:linear-gradient(180deg,#fffbf0,#fff8e1);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:70px}
.main{padding:20px;max-width:1300px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:var(--card);border-radius:18px;padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);transition:.2s;position:relative}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.del{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;z-index:2;transition:.2s}
.del:hover{background:#e1705515;color:var(--red);border-color:var(--red)}
.top-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.av-wrap{position:relative;flex-shrink:0}
.av{width:75px;height:75px;border-radius:50%;object-fit:cover;border:3px solid var(--border);background:var(--bg)}
.info{flex:1;min-width:0}
.name{font-family:'Baloo Bhaina 2',serif;font-size:16px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.name .ei{font-size:10px;opacity:0;transition:.2s}.name:hover .ei{opacity:.5}
.total{font-size:30px;font-weight:800;color:var(--accent);font-family:'Baloo Bhaina 2',serif;display:flex;align-items:center;gap:4px}
/* Streak badge */
.streak-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#ff6b35,#ff8c42);color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;margin-left:8px;animation:pulse 2s infinite}
.streak-badge.dim{opacity:.35;filter:grayscale(.5);animation:none}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.ctrl{display:none;gap:4px;margin-top:2px}.ctrl.on{display:flex}
.sb{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sb-p{background:#00b89415;color:var(--green);border:2px solid #00b89430}.sb-p:hover{background:#00b89430;transform:scale(1.1)}
.sb-m{background:#e1705515;color:var(--red);border:2px solid #e1705530}.sb-m:hover{background:#e1705530;transform:scale(1.1)}
.skills{margin-top:4px}
.sr{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.sl{font-family:'Baloo Bhaina 2',serif;font-size:12px;font-weight:700;color:var(--purple);width:18px;text-align:center}
.lc{display:flex;gap:4px;flex:1}
.lv{flex:1;height:28px;border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-dim);transition:.15s;border:1px solid transparent;cursor:default;position:relative;min-width:0;overflow:hidden}
.lv:hover{border-color:var(--accent)}
.lv.l1{color:#e17055;background:#e1705510}.lv.l2{color:#d35400;background:#fdcb6e15}.lv.l3{color:#b8860b;background:#ffeaa730}.lv.l4{color:#00b894;background:#55efc420}.lv.l5{color:#0984e3;background:#74b9ff20}
.lv.fill.l1{background:#e1705530}.lv.fill.l2{background:#fdcb6e30}.lv.fill.l3{background:#ffeaa750}.lv.fill.l4{background:#55efc440}.lv.fill.l5{background:#74b9ff40}
.st{font-size:12px;font-weight:700;width:22px;text-align:center;font-family:'Baloo Bhaina 2',serif}
/* Modal */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal.open{display:flex}
.mb{background:var(--card);border-radius:22px;padding:28px;max-width:650px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mb h2{font-family:'Baloo Bhaina 2',serif;font-size:22px;text-align:center;margin-bottom:20px;color:var(--accent)}
.lbs{margin-bottom:20px}.lbs h3{font-size:14px;margin-bottom:10px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.lr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;background:var(--bg);border:1px solid var(--border)}
.lrk{font-size:22px;width:32px;text-align:center}.r1{color:#f39c12}.r2{color:#95a5a6}.r3{color:#d35400}
.la{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
.ln{flex:1;font-weight:700;font-family:'Baloo Bhaina 2',serif}
.ls{font-size:17px;font-weight:800;color:var(--accent);font-family:'Baloo Bhaina 2',serif}
.fi{margin-bottom:12px}.fi label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:3px;font-weight:700}
.fi input{width:100%;padding:9px 12px;border-radius:12px;border:2px solid var(--border);background:var(--bg);font-size:14px;outline:none;font-family:Quicksand,sans-serif}.fi input:focus{border-color:var(--accent)}
/* Full streak leaderboard */
.streak-list{max-height:280px;overflow-y:auto}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;z-index:300;animation:si .3s;box-shadow:var(--shadow-lg)}
@keyframes si{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){.grid{grid-template-columns:1fr}.nav-inner{flex-direction:column;align-items:flex-start}.teacher-bar{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<div class="navbar">
<div class="nav-inner">
<a class="logo-link" href="https://hoctienganhdelam.com" target="_blank">
<img class="logo-img" src="https://hoctienganhdelam.com/logo.png" alt="Logo">
<span class="logo-text">Học Tiếng Anh<span class="logo-sub">DỄ LẮM</span></span>
</a>
<div class="nav-btns" id="navBtns">
<input type="password" class="inp" id="pw" placeholder="🔑 MK giáo viên" onkeydown="if(event.key==='Enter')login()">
<button class="btn btn-p" onclick="login()">Đăng nhập</button>
<button class="btn btn-o" onclick="openAdd()">➕ Thêm HS</button>
<button class="btn btn-o" onclick="openLB()">🏆 Xếp hạng</button>
</div>
</div>
</div>

<div class="teacher-bar">
<span class="badge badge-off" id="statusBadge">🔒 Chưa đăng nhập</span>
<span style="font-size:13px;color:var(--text-dim)">👩‍🏫 <span id="teacherNameLabel">Giáo viên</span></span>
</div>

<div class="main"><div class="grid" id="grid"></div></div>

<!-- Leaderboard Modal -->
<div class="modal" id="lbModal"><div class="mb">
<h2>🏆 Bảng Xếp Hạng</h2>
<div class="lbs"><h3>⭐ Top Điểm Tổng</h3><div id="topTotal"></div></div>
<div class="lbs"><h3>🗣️✍️ Top Kỹ Năng</h3><div id="topSkills"></div></div>
<div class="lbs"><h3>🔥 Top Streak – Đi Học Đều Nhất</h3><div id="topStreak"></div></div>
<div class="lbs"><h3>📋 Toàn Bộ Streak</h3><div class="streak-list" id="allStreaks"></div></div>
<button class="btn btn-o" style="margin:0 auto;display:block" onclick="closeLB()">Đóng</button>
</div></div>

<!-- Add Student Modal -->
<div class="modal" id="addModal"><div class="mb">
<h2>➕ Thêm Học Sinh</h2>
<div class="fi"><label>Tên học sinh</label><input id="newName" placeholder="Nhập tên..."></div>
<button class="btn btn-p" style="width:100%;justify-content:center" onclick="addStudent()">Thêm</button>
<button class="btn btn-o" style="width:100%;justify-content:center;margin-top:8px" onclick="closeAdd()">Đóng</button>
</div></div>

<script src="scoreboard.js?v=2"></script>
</body>
</html>
