<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng Điểm Thi Đua - Học Tiếng Anh Dễ Lắm</title>
<link rel="icon" href="https://hoctienganhdelam.com/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaina+2:wght@400..800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFF8ED;--card:#fff;--text:#333;--text-dim:#999;--accent:#fcbe5d;--accent2:#f7d281;--purple:#6C5CE7;--green:#00b894;--red:#e17055;--blue:#0984e3;--border:#f0e6d3;--shadow:0 4px 20px rgba(0,0,0,.06);--shadow-lg:0 8px 36px rgba(0,0,0,.1);--streak:#ff6b35}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Quicksand,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.navbar{position:fixed;top:0;width:100%;background:rgba(255,250,240,.98);backdrop-filter:blur(10px);box-shadow:0 2px 16px rgba(0,0,0,.06);z-index:100;padding:10px 0;border-bottom:1px solid var(--border)}
.nav-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 20px;flex-wrap:wrap;gap:10px}
.logo-link{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-img{height:40px}.logo-text{font-family:'Baloo Bhaina 2',serif;font-weight:800;font-size:18px;color:#d4a017;line-height:1.2}
.logo-sub{font-size:9px;color:var(--accent);letter-spacing:1px;display:block}
.nav-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.inp{border:2px solid var(--border);border-radius:20px;padding:7px 14px;font-size:13px;background:var(--card);color:var(--text);outline:none;font-family:Quicksand,sans-serif;width:140px;transition:.2s}
.inp:focus{border-color:var(--accent)}
.btn{border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:Quicksand,sans-serif;transition:.2s}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#333}.btn-p:hover{transform:translateY(-1px);box-shadow:0 2px 12px rgba(252,190,93,.4)}
.btn-o{background:var(--card);border:2px solid var(--border);color:var(--text)}.btn-o:hover{background:#fffbf0;border-color:var(--accent)}
.btn-d{background:linear-gradient(135deg,#e17055,#d63031);color:#fff}.btn-d:hover{transform:translateY(-1px)}
.main{padding:20px;max-width:1300px;margin:60px auto 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:var(--card);border-radius:18px;padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);transition:.2s;position:relative}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.del{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;z-index:2;transition:.2s}
.del:hover{background:#e1705515;color:var(--red);border-color:var(--red)}
.top-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.av-wrap{position:relative;flex-shrink:0;cursor:pointer}
.av{width:75px;height:75px;border-radius:50%;object-fit:cover;border:3px solid var(--border);background:linear-gradient(135deg,var(--bg),#fff);transition:.2s}
.av:hover{border-color:var(--accent)}
.av-edit{position:absolute;bottom:0;right:0;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;cursor:pointer;transition:.2s}
.av-edit:hover{background:var(--purple);transform:scale(1.15)}
.info{flex:1;min-width:0}
.name{font-family:'Baloo Bhaina 2',serif;font-size:16px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.name .ei{font-size:10px;opacity:0;transition:.2s}.name:hover .ei{opacity:.5}
.total{font-size:30px;font-weight:800;color:var(--accent);font-family:'Baloo Bhaina 2',serif;display:flex;align-items:center;gap:4px}
.streak-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#ff6b35,#ff8c42);color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;margin-left:8px;animation:pulse 2s infinite}
.streak-badge.dim{opacity:.35;filter:grayscale(.5);animation:none}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.ctrl{display:none;gap:4px;margin-top:2px}.ctrl.on{display:flex}
.sb{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.15s}
.sb-p{background:#00b89415;color:var(--green);border:2px solid #00b89430}.sb-p:hover{background:#00b89430;transform:scale(1.1)}
.sb-m{background:#e1705515;color:var(--red);border:2px solid #e1705530}.sb-m:hover{background:#e1705530;transform:scale(1.1)}
.skills{margin-top:4px}
.sr{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.sl{font-family:'Baloo Bhaina 2',serif;font-size:12px;font-weight:700;color:var(--purple);width:18px;text-align:center}
.lc{display:flex;gap:4px;flex:1}
.lv{flex:1;height:32px;border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-dim);transition:.15s;border:1px solid transparent;cursor:default;position:relative;min-width:0;overflow:hidden}
.lv:hover{border-color:var(--accent)}
.lv.l1{color:#e17055;background:#e1705510}.lv.l2{color:#d35400;background:#fdcb6e15}.lv.l3{color:#b8860b;background:#ffeaa730}.lv.l4{color:#00b894;background:#55efc420}.lv.l5{color:#0984e3;background:#74b9ff20}
.lv.fill.l1{background:#e1705530}.lv.fill.l2{background:#fdcb6e30}.lv.fill.l3{background:#ffeaa750}.lv.fill.l4{background:#55efc440}.lv.fill.l5{background:#74b9ff40}
.lv-minus{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;font-weight:800;display:none;align-items:center;justify-content:center;line-height:1;cursor:pointer;z-index:1;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.lv:hover .lv-minus{display:flex}.lv-minus:hover{background:#c0392b;transform:scale(1.2)}
.st{font-size:12px;font-weight:700;width:22px;text-align:center;font-family:'Baloo Bhaina 2',serif}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal.open{display:flex}
.mb{background:var(--card);border-radius:22px;padding:28px;max-width:650px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mb h2{font-family:'Baloo Bhaina 2',serif;font-size:22px;text-align:center;margin-bottom:20px;color:var(--accent)}
.lbs{margin-bottom:20px}.lbs h3{font-size:14px;margin-bottom:10px;color:var(--text-dim)}
.lr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;background:var(--bg);border:1px solid var(--border)}
.lrk{font-size:22px;width:32px;text-align:center}
.la{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
.ln{flex:1;font-weight:700;font-family:'Baloo Bhaina 2',serif}
.ls{font-size:17px;font-weight:800;color:var(--accent);font-family:'Baloo Bhaina 2',serif}
.fi{margin-bottom:12px}.fi label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:3px;font-weight:700}
.fi input{width:100%;padding:9px 12px;border-radius:12px;border:2px solid var(--border);background:var(--bg);font-size:14px;outline:none;font-family:Quicksand,sans-serif}.fi input:focus{border-color:var(--accent)}
.avatar-picker{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.av-opt{width:48px;height:48px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s;object-fit:cover}.av-opt:hover,.av-opt.sel{border-color:var(--accent);transform:scale(1.1)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;z-index:300;animation:si .3s;box-shadow:var(--shadow-lg)}
@keyframes si{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
.loading{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.75);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:12px;backdrop-filter:blur(2px)}
.loading.show{display:flex}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top:4px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-weight:700;color:var(--accent);font-size:15px}
@media(max-width:768px){.grid{grid-template-columns:1fr}.nav-inner{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<div class="navbar">
<div class="nav-inner">
<a class="logo-link" href="https://hoctienganhdelam.com" target="_blank">
<img class="logo-img" src="https://hoctienganhdelam.com/logo.png" alt="Logo">
<span class="logo-text">Học Tiếng Anh<span class="logo-sub">DỄ LẮM</span></span>
</a>
<div class="nav-btns" id="navBtns">
<button class="btn btn-o" onclick="openAdd()">➕ Thêm HS</button>
<button class="btn btn-o" onclick="openLB()">🏆 Xếp hạng</button>
<button class="btn btn-p" onclick="saveToSheet()">💾 Save</button>
<button class="btn btn-o" onclick="loadFromSheet()">📂 Load</button>
</div>
</div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><div class="loading-text" id="loadingText">Đang xử lý...</div></div>
<div class="main"><div class="grid" id="grid"></div></div>

<div class="modal" id="lbModal"><div class="mb">
<h2>🏆 Bảng Xếp Hạng</h2>
<div class="lbs"><h3>⭐ Top Điểm Tổng</h3><div id="topTotal"></div></div>
<div class="lbs"><h3>🗣️✍️ Top Kỹ Năng</h3><div id="topSkills"></div></div>
<div class="lbs"><h3>🔥 Top Streak</h3><div id="topStreak"></div></div>
<button class="btn btn-o" style="margin:10px auto 0;display:block" onclick="closeLB()">Đóng</button>
</div></div>

<div class="modal" id="addModal"><div class="mb">
<h2>➕ Thêm Học Sinh</h2>
<div class="fi"><label>Tên học sinh</label><input id="newName" placeholder="Nhập tên..."></div>
<button class="btn btn-p" style="width:100%;justify-content:center" onclick="addStudent()">Thêm</button>
<button class="btn btn-o" style="width:100%;justify-content:center;margin-top:8px" onclick="closeAdd()">Đóng</button>
</div></div>

<div class="modal" id="avModal"><div class="mb">
<h2>🖼️ Chọn Avatar</h2>
<p style="text-align:center;color:var(--text-dim);margin-bottom:12px">Chọn 1 avatar cho <b id="avStudentName"></b></p>
<div class="avatar-picker" id="avPicker"></div>
<button class="btn btn-o" style="margin:12px auto 0;display:block" onclick="closeAv()">Đóng</button>
</div></div>

<script>
var API = "https://script.google.com/macros/s/AKfycbyVtBbsGy_3N2gWP56XtnC8lfNA_5L-C8NZUtCtvPn48M2S6U6MlMLIikG6P2DXfTjKyg/exec";
var students = [];

function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function showLoading(msg){document.getElementById("loadingText").textContent=msg;document.getElementById("loading").classList.add("show")}
function hideLoading(){document.getElementById("loading").classList.remove("show")}

async function saveToSheet(){
  showLoading("💾 Đang lưu vào Sheet...");
  try {
    var resp = await fetch(API, {method:"POST", body:JSON.stringify({action:"save", students:students})});
    var j = await resp.json();
    hideLoading();
    if(j && j.ok) toast("💾 Đã lưu "+j.count+" học sinh!");
    else toast("❌ Lỗi lưu: "+(j?j.error:"không rõ"));
  } catch(e){ hideLoading(); toast("❌ Mất kết nối"); }
}

async function loadFromSheet(){
  showLoading("📂 Đang tải từ Sheet...");
  try {
    var resp = await fetch(API, {method:"POST", body:JSON.stringify({action:"load"})});
    var j = await resp.json();
    if(j && j.students){ students = j.students; render(); }
    hideLoading();
    if(j && j.ok) toast("📂 Đã tải "+students.length+" học sinh!");
    else toast("❌ "+(j?j.error:"không kết nối được"));
  } catch(e){ hideLoading(); toast("❌ Mất kết nối"); }
}

function addStudent(){
  var name = document.getElementById("newName").value.trim();
  if(!name){ toast("⚠️ Nhập tên!"); return; }
  var id = "s"+Date.now()+"_"+Math.random().toString(36).substr(2,5);
  students.push({id:id, name:name, avatar:"", totalScore:0, writing:[0,0,0,0,0], speaking:[0,0,0,0,0], lastActive:"", streak:0});
  closeAdd(); render();
  toast("✅ Đã thêm: "+name);
}

function deleteStudent(sid){
  var s = students.find(function(x){return x.id===sid});
  if(!confirm('Xóa "'+s.name+'"? Không thể hoàn tác.')) return;
  students = students.filter(function(x){return x.id!==sid});
  render(); toast("🗑 Đã xóa");
}

function adjScore(sid, delta){
  var s = students.find(function(x){return x.id===sid});
  if(!s) return;
  s.totalScore = Math.max(0, s.totalScore + delta);
  if(delta > 0) updateStreak(s);
  render();
}

function adjLevel(sid, skill, level, delta){
  var s = students.find(function(x){return x.id===sid});
  if(!s) return;
  s[skill][level] = Math.max(0, s[skill][level] + delta);
  if(delta > 0) updateStreak(s);
  render();
}

function updateStreak(s){
  var d = new Date();
  var today = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  d.setDate(d.getDate()-1);
  var yesterday = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  if(s.lastActive === today) return;
  s.lastActive = today;
  s.streak = (s.streak > 0 && s.lastActive === yesterday) ? s.streak + 1 : 1;
}

function startEdit(sid){
  var s = students.find(function(x){return x.id===sid});
  var el = document.querySelector('[data-sid="'+sid+'"]');
  el.innerHTML = '<input style="border:2px solid var(--accent);border-radius:8px;padding:2px 8px;font-size:15px;font-weight:700;width:140px;font-family:Quicksand,sans-serif" id="en_'+sid+'" value="'+esc(s.name)+'" onkeydown="if(event.key===\'Enter\')saveEdit(\''+sid+'\')" onblur="saveEdit(\''+sid+'\')">';
  setTimeout(function(){var inp=document.getElementById("en_"+sid);if(inp){inp.focus();inp.select();}},50);
}
function saveEdit(sid){
  var inp = document.getElementById("en_"+sid);
  if(!inp){ render(); return; }
  var name = inp.value.trim();
  if(!name){ render(); return; }
  var s = students.find(function(x){return x.id===sid});
  if(s) s.name = name;
  render(); toast("✅ Đổi tên: "+name);
}

var AVATARS = ["https://api.dicebear.com/9.x/fun-emoji/svg?seed=cat","https://api.dicebear.com/9.x/fun-emoji/svg?seed=dog","https://api.dicebear.com/9.x/fun-emoji/svg?seed=rabbit","https://api.dicebear.com/9.x/fun-emoji/svg?seed=panda","https://api.dicebear.com/9.x/fun-emoji/svg?seed=lion","https://api.dicebear.com/9.x/fun-emoji/svg?seed=tiger","https://api.dicebear.com/9.x/fun-emoji/svg?seed=monkey","https://api.dicebear.com/9.x/fun-emoji/svg?seed=frog","https://api.dicebear.com/9.x/fun-emoji/svg?seed=giraffe","https://api.dicebear.com/9.x/fun-emoji/svg?seed=koala","https://api.dicebear.com/9.x/fun-emoji/svg?seed=fox","https://api.dicebear.com/9.x/fun-emoji/svg?seed=bear","https://api.dicebear.com/9.x/bottts/svg?seed=dice","https://api.dicebear.com/9.x/adventurer/svg?seed=girl","https://api.dicebear.com/9.x/adventurer/svg?seed=boy","https://api.dicebear.com/9.x/lorelei/svg?seed=star","https://api.dicebear.com/9.x/pixel-art/svg?seed=hero","https://api.dicebear.com/9.x/pixel-art/svg?seed=ninja"];
var curAvSid = "";
function openAvatar(sid){curAvSid=sid;var s=students.find(function(x){return x.id===sid});document.getElementById("avStudentName").textContent=s.name;var h='<div class="av-opt'+(s.avatar?'':' sel')+'" onclick="setAvatar(\''+sid+'\',\'\')">'+getAvSvg(s)+'</div>';AVATARS.forEach(function(u){h+='<img class="av-opt'+(s.avatar===u?' sel':'')+'" src="'+u+'" onclick="setAvatar(\''+sid+'\',\''+u+'\')">'});document.getElementById("avPicker").innerHTML=h;document.getElementById("avModal").classList.add("open")}
function closeAv(){document.getElementById("avModal").classList.remove("open")}
function setAvatar(sid,url){var s=students.find(function(x){return x.id===sid});s.avatar=url;render();document.getElementById("avModal").classList.remove("open")}
function getAvSvg(s){var p=s.name.trim().split(" "),ini=p[p.length-1].charAt(0).toUpperCase();var c=["#fcbe5d","#6C5CE7","#e17055","#00b894","#0984e3","#fdcb6e","#d63031","#74b9ff","#a29bfe","#fd79a8"][(s.name.length||0)%10];return'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="'+c+'"/><text x="50" y="54" text-anchor="middle" font-size="34" font-weight="bold" fill="white">'+ini+'</text></svg>'}
function getAv(s){return s.avatar||"data:image/svg+xml,"+encodeURIComponent(getAvSvg(s))}

function skillTotal(s,sk){var t=0;for(var i=0;i<s[sk].length;i++)t+=s[sk][i]*(i+1);return t}
function renderSkill(s,skill,label){var a=s[skill],t=skillTotal(s,skill),cells="";for(var i=0;i<a.length;i++){var fc=a[i]>0?" fill":"";cells+='<div class="lv l'+(i+1)+fc+'" onclick="adjLevel(\''+s.id+'\',\''+skill+'\','+i+',1)" style="cursor:pointer">'+a[i]+'<button class="lv-minus" onclick="event.stopPropagation();adjLevel(\''+s.id+'\',\''+skill+'\','+i+',-1)">−</button></div>'}return'<div class="sr"><div class="sl">'+label+'</div><div class="lc">'+cells+'</div><div class="st">'+t+'</div></div>'}

function render(){
  var g=document.getElementById("grid");
  g.innerHTML=students.map(function(s){
    var del='<button class="del" onclick="event.stopPropagation();deleteStudent(\''+s.id+'\')">✕</button>';
    var sb=(s.streak>0)?'<span class="streak-badge">🔥 '+s.streak+' ngày</span>':'';
    return'<div class="card">'+del+'<div class="top-row"><div class="av-wrap" onclick="openAvatar(\''+s.id+'\')"><img class="av" src="'+getAv(s)+'"><div class="av-edit">✎</div></div><div class="info"><div class="name" data-sid="'+s.id+'" onclick="event.stopPropagation();startEdit(\''+s.id+'\')">'+s.name+'<span class="ei">✏️</span>'+sb+'</div><div class="total">⭐ '+s.totalScore+'</div><div class="ctrl on"><button class="sb sb-p" onclick="adjScore(\''+s.id+'\',1)">+</button><button class="sb sb-m" onclick="adjScore(\''+s.id+'\',-1)">−</button></div></div></div><div class="skills">'+renderSkill(s,"writing","W")+renderSkill(s,"speaking","S")+'</div></div>';
  }).join("");
}

function openAdd(){document.getElementById("newName").value="";document.getElementById("addModal").classList.add("open")}
function closeAdd(){document.getElementById("addModal").classList.remove("open")}
function openLB(){var s=students.slice();if(!s.length){["topTotal","topSkills","topStreak"].forEach(function(id){document.getElementById(id).innerHTML='<div style="text-align:center;color:var(--text-dim);padding:16px">Chưa có dữ liệu</div>'});}else{lbList("topTotal",s.sort(function(a,b){return b.totalScore-a.totalScore}).slice(0,3),function(x){return x.totalScore+" ⭐"});lbList("topSkills",s.sort(function(a,b){return(skillTotal(b,"writing")+skillTotal(b,"speaking"))-(skillTotal(a,"writing")+skillTotal(a,"speaking"))}).slice(0,3),function(x){return(skillTotal(x,"writing")+skillTotal(x,"speaking"))+" câu"});lbList("topStreak",s.filter(function(x){return x.streak>0}).sort(function(a,b){return b.streak-a.streak}).slice(0,3),function(x){return x.streak+" ngày 🔥"})}document.getElementById("lbModal").classList.add("open")}
function closeLB(){document.getElementById("lbModal").classList.remove("open")}
function lbList(id,arr,fn){var em=["🥇","🥈","🥉"];document.getElementById(id).innerHTML=arr.map(function(s,i){return'<div class="lr"><div class="lrk">'+em[i]+'</div><img class="la" src="'+getAv(s)+'"><div class="ln">'+s.name+'</div><div class="ls">'+fn(s)+'</div></div>'}).join("")}

function toast(m){var ex=document.querySelector(".toast");if(ex)ex.remove();var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2500)}

document.getElementById("lbModal").addEventListener("click",function(e){if(e.target===this)closeLB()});
document.getElementById("addModal").addEventListener("click",function(e){if(e.target===this)closeAdd()});
document.getElementById("avModal").addEventListener("click",function(e){if(e.target===this)closeAv()});

// Auto-load on start
if(API){
  showLoading("📂 Đang tải dữ liệu...");
  (async function(){
    try {
      var resp = await fetch(API, {method:"POST", body:JSON.stringify({action:"load"})});
      var j = await resp.json();
      if(j && j.students) students = j.students;
    } catch(e){}
    hideLoading();
    render();
  })();
} else { render(); }
</script>
