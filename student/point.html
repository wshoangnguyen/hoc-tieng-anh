<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý điểm học sinh | English Class</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
    <!-- Màn hình danh sách lớp -->
    <div id="classScreen" class="class-screen">
        <h1>📚 Chọn lớp học</h1>
        <div class="sub">Giáo viên chọn lớp để xem danh sách và cập nhật điểm</div>
        <div id="classList" class="class-grid"></div>
    </div>

    <!-- Màn hình chi tiết lớp học -->
    <div id="studentScreen" class="student-screen hidden">
        <div class="classroom-header">
            <div class="title-area">
                <h1 id="classNameTitle">🏫 Lớp ...</h1>
            </div>
            <div class="action-buttons">
                <button id="gameBtn" class="game-btn">🎲 Lucky Sticker</button>
                <button id="gameBtn2" class="game-btn">🎯 Lucky Student</button>
                <button id="backBtnModern" class="back-btn-modern">← Quay lại</button>
                <button id="saveBtnModern" class="save-btn-modern">💾 Lưu điểm</button>
            </div>
        </div>
        <div id="studentsGrid" class="students-container"></div>
    </div>
</div>

<!-- Logo góc phải -->
<div class="brand-logo-float" id="brandLogoFloat">
    <img src="https://lh3.googleusercontent.com/d/1e7uth2SJ0qoL0cHXBizZunjscTiJ9Da9=s400" alt="English Logo" onerror="this.src='https://via.placeholder.com/70?text=LOGO'">
</div>

<!-- Loading overlay -->
<div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner">
        <div class="spinner"></div>
        <div class="loading-text">Đang tải dữ liệu...</div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
